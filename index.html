<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <!-- Apply the saved/auto theme before first paint to avoid a flash. Mirrors
         src/utils/theme.js (keep in sync). -->
    <script>
      (function () {
        try {
          var p = localStorage.getItem('gardnr-theme');
          if (p !== 'light' && p !== 'dark') {
            p = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
          }
          document.documentElement.setAttribute('data-theme', p);
        } catch (e) {}
      })();
    </script>

    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#062120" />

    <title>Gardnr — Nutrition coaching software</title>
    <meta name="description" content="Gardnr is nutrition coaching software that creates the conditions for client growth." />

    <!-- Open Graph / social -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Gardnr" />
    <meta property="og:title" content="Gardnr — Nutrition coaching software" />
    <meta property="og:description" content="Create conditions for growth." />
    <meta property="og:url" content="https://gardnr.fit" />
    <meta property="og:image" content="https://gardnr.fit/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Gardnr — Nutrition coaching software" />
    <meta name="twitter:description" content="Create conditions for growth." />
    <meta name="twitter:image" content="https://gardnr.fit/og.png" />

    <style>
      /* Cold-start splash (esp. the mobile PWA): a black screen with the Gardnr
         mark that pulses while the app boots, then grows toward the viewer and
         fades to reveal the ready app — Netflix-style. */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: #0a0a0a;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 3s ease;
      }
      #splash img {
        width: 132px;
        height: 132px;
        animation: splashPulse 1.8s ease-in-out infinite;
        will-change: transform, opacity;
      }
      @keyframes splashPulse {
        0%, 100% { transform: scale(1); opacity: 0.8; }
        50% { transform: scale(1.08); opacity: 1; }
      }
      #splash.splash-done { opacity: 0; pointer-events: none; }
      #splash.splash-done img {
        animation: splashReveal 3s cubic-bezier(0.45, 0, 0.75, 0.4) forwards;
      }
      @keyframes splashReveal {
        0% { transform: scale(1.08); opacity: 1; }
        60% { opacity: 1; }
        100% { transform: scale(21); opacity: 0; }
      }
      @media (prefers-reduced-motion: reduce) {
        #splash img, #splash.splash-done img { animation: none; }
      }
    </style>
  </head>
  <body>
    <div id="splash"><img src="/logo-icon.svg" alt="Gardnr" width="132" height="132" /></div>
    <div id="root"></div>
    <script>
      (function () {
        var start = Date.now();
        var MIN = 900; // show the pulse at least this long before the zoom-reveal
        function reveal() {
          var s = document.getElementById('splash');
          if (!s || s.classList.contains('splash-done')) return;
          clearTimeout(window.__splashTimer);
          s.classList.add('splash-done');
          setTimeout(function () { if (s.parentNode) s.remove(); }, 3100);
        }
        window.hideSplash = function () {
          setTimeout(reveal, Math.max(0, MIN - (Date.now() - start)));
        };
        // Safety net: never trap the user on the splash if the app stalls.
        window.__splashTimer = setTimeout(reveal, 8000);
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
